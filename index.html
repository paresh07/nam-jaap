<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nam Jaap</title>
  <meta name="description" content="A beautiful and serene Nam Jaap counter that works offline.">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b101e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;600&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
</head>
<body>
  <!-- Ripple container for full screen taps -->
  <div id="ripple-container"></div>
  
  <div class="app-container" id="tap-area">
    <header class="header">
      <div id="status-indicator" class="status online">Online</div>
      <div class="header-controls">
        <button id="reports-btn" class="icon-btn" aria-label="Reports" title="View History & Reports">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
        </button>
        <button id="settings-btn" class="icon-btn" aria-label="Settings" title="Display Settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </div>
    </header>

    <main class="main-content">
      <div class="mantra-display">
        <h1 id="mantra-text" class="calm-text">राधा</h1>
      </div>
    </main>

    <footer class="stats-footer">
      <div class="stats-container">
        <div class="stat-box">
          <span class="stat-label">Today</span>
          <span id="count-today" class="stat-value pulse-target">0</span>
        </div>
        <div class="stat-box main-stat">
          <span class="stat-label">Malas (108)</span>
          <span id="count-malas" class="stat-value highlight pulse-target">0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Lifetime</span>
          <span id="count-total" class="stat-value">0</span>
        </div>
      </div>
      
      <div class="controls">
        <button id="reset-btn" class="icon-btn text-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          Reset Stats
        </button>
      </div>
    </footer>
  </div>

  <!-- Reports Modal -->
  <div id="reports-modal" class="modal">
    <div class="modal-content large-modal">
      <div class="modal-header">
        <h2>History & Reports</h2>
        <button class="close-btn" id="close-reports" aria-label="Close">&times;</button>
      </div>
      <div class="reports-body">
        <div class="report-filters">
          <label for="report-period">Time Period:</label>
          <select id="report-period">
            <option value="60">Last 2 Months</option>
            <option value="30">Last 30 Days</option>
            <option value="all">All Time</option>
          </select>
        </div>
        <div class="table-container">
          <table class="report-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Chants</th>
                <th>Malas</th>
              </tr>
            </thead>
            <tbody id="report-table-body">
              <!-- Rows injected via JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal">
    <div class="modal-content">
      <h2>Display Settings</h2>
      <div class="form-group">
        <label for="mantra-input">Chant Name / Mantra</label>
        <input type="text" id="mantra-input" value="राधा" placeholder="e.g. राधा, Ram, Om">
      </div>
      <div class="modal-actions">
        <button id="cancel-settings" class="modal-btn cancel">Cancel</button>
        <button id="save-settings" class="modal-btn confirm">Save</button>
      </div>
    </div>
  </div>

  <!-- Reset Modal -->
  <div id="reset-modal" class="modal">
    <div class="modal-content">
      <h2>Reset Stats?</h2>
      <p>Are you sure you want to reset your counts? This will clear your entire history. This action cannot be undone.</p>
      <div class="modal-actions">
        <button id="cancel-reset" class="modal-btn cancel">Cancel</button>
        <button id="confirm-reset" class="modal-btn confirm">Reset All</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
